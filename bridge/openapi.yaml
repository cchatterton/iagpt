openapi: 3.1.0
info:
  title: Analytics Chat Bridge
  version: 0.1.0
  description: Hosted bridge API for a public Analytics Chat for WordPress GPT.
servers:
  - url: https://app.analyticschat.example/api/v1
security:
  - bearerAuth: []
paths:
  /sites:
    get:
      operationId: listWebsites
      summary: List connected WordPress websites.
      responses:
        "200":
          description: Connected websites.
  /sites/connect/start:
    post:
      operationId: startSiteConnection
      summary: Start connecting a new WordPress website.
      responses:
        "201":
          description: Connection details for the user to complete in WordPress.
  /sites/connect/{connection_id}/status:
    get:
      operationId: getSiteConnectionStatus
      summary: Check whether a site connection has completed.
      parameters:
        - name: connection_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Site connection status.
  /sites/{site_id}:
    delete:
      operationId: disconnectWebsite
      summary: Disconnect a WordPress website.
      parameters:
        - name: site_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Site disconnected.
  /sites/{site_id}/site-summary:
    get:
      operationId: getSiteSummary
      summary: Get overall website analytics summary for a connected site.
      parameters:
        - name: site_id
          in: path
          required: true
          schema:
            type: string
        - name: period
          in: query
          schema:
            type: string
            example: 30d
        - name: start_date
          in: query
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          schema:
            type: string
            format: date
        - name: compare
          in: query
          schema:
            type: string
            enum: [previous_period, none]
      responses:
        "200":
          description: Site summary metrics.
  /sites/{site_id}/top-content:
    get:
      operationId: getTopContent
      summary: Get top performing WordPress content for a connected site.
      parameters:
        - $ref: "#/components/parameters/SiteId"
        - $ref: "#/components/parameters/Period"
        - name: post_type
          in: query
          schema:
            type: string
            example: any
        - $ref: "#/components/parameters/Limit"
        - name: order_by
          in: query
          schema:
            type: string
            enum: [views, visitors, conversions, conversion_rate, engagement]
      responses:
        "200":
          description: Top content rows.
  /sites/{site_id}/content-performance:
    get:
      operationId: getContentPerformance
      summary: Get analytics for a specific page or post on a connected site.
      parameters:
        - $ref: "#/components/parameters/SiteId"
        - name: post_id
          in: query
          schema:
            type: integer
        - name: url
          in: query
          schema:
            type: string
        - $ref: "#/components/parameters/Period"
        - name: compare
          in: query
          schema:
            type: string
            enum: [previous_period, none]
      responses:
        "200":
          description: Content performance data.
  /sites/{site_id}/content-opportunities:
    get:
      operationId: getContentOpportunities
      summary: Find content opportunities and risks for a connected site.
      parameters:
        - $ref: "#/components/parameters/SiteId"
        - $ref: "#/components/parameters/Period"
        - $ref: "#/components/parameters/Limit"
        - name: opportunity_type
          in: query
          schema:
            type: string
            enum: [traffic_no_conversion, declining, rising, high_exit, stale_but_visited, all]
      responses:
        "200":
          description: Content opportunities.
  /sites/{site_id}/referrers:
    get:
      operationId: getReferrers
      summary: Get referrer and traffic source performance for a connected site.
      parameters:
        - $ref: "#/components/parameters/SiteId"
        - $ref: "#/components/parameters/Period"
        - name: post_id
          in: query
          schema:
            type: integer
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Referrer data.
  /sites/{site_id}/campaigns:
    get:
      operationId: getCampaigns
      summary: Get campaign performance where available for a connected site.
      parameters:
        - $ref: "#/components/parameters/SiteId"
        - $ref: "#/components/parameters/Period"
        - name: campaign
          in: query
          schema:
            type: string
        - name: source
          in: query
          schema:
            type: string
        - name: medium
          in: query
          schema:
            type: string
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Campaign performance.
  /sites/{site_id}/forms:
    get:
      operationId: getForms
      summary: Get form conversion performance where available for a connected site.
      parameters:
        - $ref: "#/components/parameters/SiteId"
        - $ref: "#/components/parameters/Period"
        - name: form_id
          in: query
          schema:
            type: string
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Form conversion data.
  /sites/{site_id}/user-journey:
    get:
      operationId: getUserJourney
      summary: Get anonymised user journey patterns where available for a connected site.
      parameters:
        - $ref: "#/components/parameters/SiteId"
        - $ref: "#/components/parameters/Period"
        - name: post_id
          in: query
          schema:
            type: integer
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Aggregated journey patterns.
components:
  parameters:
    SiteId:
      name: site_id
      in: path
      required: true
      schema:
        type: string
    Period:
      name: period
      in: query
      schema:
        type: string
        example: 30d
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        example: 20
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
